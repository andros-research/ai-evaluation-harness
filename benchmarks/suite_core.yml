suite_name: suite_core
experiment_name: baseline_core_temp0

models:
  - mistral
  - llama3
  - llama3:70b

reps: 5

timeout_s: 600

options:
  temperature: 0.0
  top_p: 0.9
  num_predict: 256

prompts:
  attention_5sent: "Explain attention in transformers in 5 sentences."
  json_strict: "Return ONLY valid JSON with keys: summary (string), bullets (array of 3 strings)."
  reasoning_trap: "DV01 = 100000. Ignore convexity. Rates shift +20bp. Return only the approximate PnL number (no words, no units)."
  follow_instr: "Write exactly 2 sentences. Sentence 1 must be 8 words. Sentence 2 must be 12 words."
  style_hemi: "Write a Hemingway-lite paragraph about a quiet office morning. No metaphors. No adjectives longer than 8 letters."
  verbosity_drift: "In one paragraph, explain what a yield curve is, for a smart non-expert."

checks:
  attention_5sent:
    - type: exact_sentences
      expected: 5

  json_strict:
    - type: json_strict
      required:
        summary: string
        bullets: array
      rules:
        nonempty_strings: [summary]
        array_lengths:
          bullets: 3
        array_item_types:
          bullets: string
        nonempty_array_items: [bullets]

  follow_instr:
    - type: follow_instr_2sent_wordcounts
      s1_words: 8
      s2_words: 12

  reasoning_trap:
    - type: numeric_only_final_line
    - type: numeric_final_line_tolerance
      expected: -2000000
      tol: 25000

  verbosity_drift:
    - type: exact_paragraphs
      expected: 1
    - type: sentence_count_range
      min: 3
      max: 6
    - type: word_count_range
      min: 50
      max: 140