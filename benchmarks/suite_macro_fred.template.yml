suite_name: suite_macro_fred

models:
  - mistral
  - llama3
  - llama3:70b

reps: 3

timeout_s: 600

prompts:
  - id: macro_regime_snapshot
    text: |
      You are given a macro snapshot.

      {{ latest_snapshot }}

      Write one short paragraph describing the macro snapshot using only the values provided.

      You may:
      - restate values
      - compare values within the snapshot

      You may NOT:
      - describe conditions as strong, weak, robust, elevated, or stable
      - infer economic conditions beyond the values shown
      - introduce any interpretation not directly supported by the data
    task_type: reasoning
    domain: macro
    difficulty: easy

  - id: macro_regime_snapshot_alt
    text: |
      You are given a macro snapshot.

      {{ snapshot_alt_1 }}

      Write one short paragraph describing the macro snapshot using only the values provided.

      You may:
      - restate values
      - compare values within the snapshot

      You may NOT:
      - describe conditions as strong, weak, robust, elevated, or stable
      - infer economic conditions beyond the values shown
      - introduce any interpretation not directly supported by the data
    task_type: reasoning
    domain: macro
    difficulty: easy

  - id: supported_statements_6m
    text: |
      You are given a macro comparison.

      {{ comparison_6m }}

      Evaluate the following statements using only the data shown:

      1. Inflation is lower at Date B than at Date A.
      2. Unemployment is lower at Date B than at Date A.
      3. The policy rate is lower at Date B than at Date A.
      4. The 10Y yield is unchanged between the two dates.

      Return ONLY valid JSON with key "supported", whose value is an array of the statement numbers that are supported.
      Return ONLY valid JSON.
      Do not include any explanation.
      Do not include any text before or after the JSON.
    task_type: reasoning
    domain: macro
    difficulty: medium

  - id: macro_compare_12m
    text: |
      You are given two macro snapshots.

      {{ comparison_12m }}

      Write one short paragraph comparing Date A and Date B.
      State what changed and what did not.
      Do not speculate about causes.
      Write exactly 3 to 4 sentences.
      Do not exceed 4 sentences.
    task_type: reasoning
    domain: macro
    difficulty: medium

  - id: macro_compare_24m
    text: |
      You are given two macro snapshots.

      {{ comparison_24m }}

      Write one short paragraph comparing Date A and Date B.
      State what changed and what did not.
      Do not speculate about causes.
      Write exactly 3 to 4 sentences.
      Do not exceed 4 sentences.
    task_type: reasoning
    domain: macro
    difficulty: medium

  - id: policy_vs_inflation
    text: |
      You are given two macro snapshots.

      {{ comparison_12m }}

      Compare Date A and Date B using only the difference between FEDFUNDS and CPI_YOY.

      Compute:
      - gap_a = FEDFUNDS at Date A minus CPI_YOY at Date A
      - gap_b = FEDFUNDS at Date B minus CPI_YOY at Date B

      Then determine whether the gap at Date B is wider or narrower than at Date A.

      Return ONLY valid JSON with keys:
      - gap_a
      - gap_b
      - direction

      Rules:
      - direction must be exactly "wider" or "narrower"
      - use only the values shown
      - do not include any explanation
      - do not include any text before or after the JSON
    task_type: reasoning
    domain: macro
    difficulty: medium

  - id: labor_inflation_balance
    text: |
      You are given a macro snapshot.

      {{ latest_snapshot }}

      Write exactly 3 sentences describing the balance between inflation and labor-market conditions.
      Use cautious language.
      Do not infer a recession, soft landing, or policy decision unless directly stated in the data.
      Do not mention forecasts, implications, policy intentions, overheating, soft landing, recession, or future risks.
      Each sentence must directly reference at least one value from the data.
    task_type: reasoning
    domain: macro
    difficulty: medium

  - id: supported_statements
    text: |
      You are given a macro comparison.

      {{ comparison_12m }}

      Evaluate the following statements using only the data shown:

      1. Inflation is lower at Date B than at Date A.
      2. Unemployment is lower at Date B than at Date A.
      3. The policy rate is lower at Date B than at Date A.
      4. The 10Y yield is unchanged between the two dates.

      Return ONLY valid JSON with key "supported", whose value is an array of the statement numbers that are supported.
      Return ONLY valid JSON.
      Do not include any explanation.
      Do not include any text before or after the JSON.
    task_type: reasoning
    domain: macro
    difficulty: medium

  - id: no_causality_discipline
    text: |
      You are given a macro snapshot.

      {{ latest_snapshot }}

      Write one paragraph stating only what the data shows.
      Do not use phrases like "because", "caused by", "due to", "therefore", or "as a result".
      Do not infer any cause.
    task_type: reasoning
    domain: macro
    difficulty: hard

checks:
  macro_regime_snapshot:
    - type: exact_paragraphs
      expected: 1
    - type: sentence_count_range
      min: 3
      max: 5
    - type: word_count_range
      min: 45
      max: 120
    - type: banned_phrases
      phrases:
        - "investor expectations"
        - "cautiously optimistic"
        - "no major red flags"
        - "alarm bells"
        - "robust"
        - "elevated"
  
  macro_regime_snapshot_alt:
    - type: exact_paragraphs
      expected: 1
    - type: sentence_count_range
      min: 3
      max: 5
    - type: word_count_range
      min: 45
      max: 120
    - type: banned_phrases
      phrases:
        - "investor expectations"
        - "cautiously optimistic"
        - "no major red flags"
        - "alarm bells"
        - "robust"
        - "elevated"

  supported_statements_6m:
    - type: json_strict
      required:
        supported: array
      rules:
        array_item_types:
          supported: number
    - type: exact_match
      expected:
        supported: [2, 3]

  macro_compare_12m:
    - type: exact_paragraphs
      expected: 1
    - type: sentence_count_range
      min: 3
      max: 4
    - type: word_count_range
      min: 45
      max: 130
  
  macro_compare_24m:
    - type: exact_paragraphs
      expected: 1
    - type: sentence_count_range
      min: 3
      max: 4
    - type: word_count_range
      min: 45
      max: 130

  policy_vs_inflation:
    - type: json_strict
      required:
        gap_a: number
        gap_b: number
        direction: string
      rules:
        nonempty_strings: [direction]

    - type: exact_match_fields
      expected:
        direction: narrower

    - type: numeric_fields_tolerance
      expected:
        gap_a: 1.95
        gap_b: 0.35
      tol: 0.02

    - type: required_terms
      terms:
        - "gap_a"
        - "gap_b"
        - "direction"

  labor_inflation_balance:
    - type: exact_sentences
      expected: 3
    - type: banned_phrases
      phrases:
        - "delicate balance"
        - "close monitoring"
        - "future trends"
        - "future risks"
        - "policy intentions"
        - "overheating"
        - "soft landing"
        - "recession"

  supported_statements:
    - type: json_strict
      required:
        supported: array
      rules:
        array_item_types:
          supported: number

    - type: exact_match
      expected:
        supported: [3]

  no_causality_discipline:
    - type: exact_paragraphs
      expected: 1
    - type: sentence_count_range
      min: 3
      max: 5
    - type: word_count_range
      min: 40
      max: 120